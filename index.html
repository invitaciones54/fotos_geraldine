<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sube tus fotos del evento</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }

        h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.5; }

        /* Estilo del botón principal */
        #upload_widget {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(110, 142, 251, 0.4);
        }

        #upload_widget:active {
            transform: scale(0.95);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Gracias por venir!</h1>
        <p>Ayúdanos a capturar cada momento. Sube aquí las fotos y videos que tomaste hoy.</p>
        
        <button id="upload_widget">📸 Subir Fotos / Videos</button>

        <div class="footer">
            Desarrollado con ❤️ para tu evento
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>  

    <script type="text/javascript">  
        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'dwf9jiy08', 
            uploadPreset: 'xv_años', // El nombre de tu preset
            sources: ['local', 'camera'], // Solo archivos locales y cámara
            multiple: true,
            language: "es",
            text: {
                es: {
                    menu: { files: "Mis fotos", camera: "Cámara" },
                    local: { browse: "Seleccionar fotos", dd_instruction: "Selecciona tus fotos" },
                    queue: { title_uploading_with_counter: "Subiendo {{num}} archivos" }
                }
            }
        }, (error, result) => { 
            if (!error && result && result.event === "success") { 
                console.log('Imagen subida:', result.info); 
            }
        });

        document.getElementById("upload_widget").addEventListener("click", function(){
            myWidget.open();
        }, false);
    </script>
</body>
</html>
